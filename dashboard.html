function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i += 1) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function useConfirmDialog() {
  const [request, setRequest] = React.useState(null);

  const confirm = React.useCallback((options) => new Promise(resolve => {
    setRequest({ ...options, resolve });
  }), []);

  const close = React.useCallback((result) => {
    setRequest(current => {
      if (current) current.resolve(result);
      return null;
    });
  }, []);

  const dialog = request ? (
    <ConfirmDialog
      {...request}
      onCancel={() => close(false)}
      onConfirm={() => close(true)}
    />
  ) : null;

  return [confirm, dialog];
}

const DASHBOARD_CONFIG = {
  apiBaseUrl: "/api",
  ...(window.DASHBOARD_CONFIG || {}),
};

const USER_COLORS = ["#2563eb", "#8b5cf6", "#0ea5e9", "#10b981", "#f59e0b", "#ef4444", "#6366f1", "#14b8a6", "#d946ef", "#64748b"];

async function dashboardRequest(path, options = {}) {
  const headers = {
    "Content-Type": "application/json",
    ...(options.headers || {}),
  };
  if (options.authToken) {
    headers.Authorization = `Bearer ${options.authToken}`;
  }
  const response = await fetch(`${DASHBOARD_CONFIG.apiBaseUrl}${path}`, {
    ...options,
    headers,
    credentials: "include",
  });
  if (!response.ok) {
    let message = `API error ${response.status}`;
    try {
      const body = await response.json();
      message = body.detail || message;
    } catch (_) {}
    const error = new Error(message);
    error.status = response.status;
    throw error;
  }
  if (response.status === 204) return null;
  return response.json();
}

function normalizeDashboardData(data, currentUser = null) {
  return {

    syncStickers: data.syncStickers || [],

    developmentTasks: data.developmentTasks || [],

  };
}

function normalizeTeam(team, currentUser = null) {
  const source = Array.isArray(team) && team.length
    ? team
    : currentUser
      ? [currentUser]
      : [];
  return source.map((member, index) => ({
    id: member.id,
    name: member.name || member.displayName || member.email || "Пользователь",
    initials: member.initials || initialsFromName(member.name || member.displayName, member.email),
    color: userColor(member, index),
    email: member.email,
  }));
}

function findTeamMember(team, id) {
  return team.find(member => member.id === id) || null;
}

function userColor(user, index = 0) {
  const id = Number(user?.id);
  const basis = Number.isFinite(id) ? id : index;
  return USER_COLORS[Math.abs(basis) % USER_COLORS.length];
}

function formatShortDate(value) {
  if (!value || value === "—") return "—";
  if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
  return new Intl.DateTimeFormat("ru-RU", { day: "numeric", month: "short" })
    .format(new Date(value + "T00:00:00"))
    .replace(".", "");
}

function KpiRadarChart({ items, size = 260 }) {
  const center = size / 2;
  const radius = size * 0.3;
  const rings = [0.25, 0.5, 0.75, 1];

  function pointAt(ratio, index) {
    const angle = -Math.PI / 2 + (index / items.length) * Math.PI * 2;
    const r = radius * ratio;
    return {
      x: center + Math.cos(angle) * r,
      y: center + Math.sin(angle) * r,
    };
  }

  function toPolyline(points) {
    return points.map(p => `${p.x},${p.y}`).join(" ");
  }

  const actualPoints = items.map((item, index) => pointAt(Math.max(.18, Math.min(1, item.actual / item.target)), index));
  const labelPoints = items.map((_, index) => pointAt(1.22, index));

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "10px 0 2px" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none" role="img" aria-label="Радарная диаграмма показателей">
        {rings.map(ring => (
          <polygon
            key={ring}
            points={toPolyline(items.map((_, index) => pointAt(ring, index)))}
            fill={ring === 1 ? "#f8fbff" : "none"}
            stroke="#d8e8fb"
            strokeWidth="1"
          />
        ))}
        {items.map((item, index) => {
          const axisEnd = pointAt(1, index);
          const label = labelPoints[index];
          return (
            <g key={item.label}>
              <line x1={center} y1={center} x2={axisEnd.x} y2={axisEnd.y} stroke="#d8e8fb" strokeWidth="1" />
              <text x={label.x} y={label.y} fill="#64748b" fontSize="11" fontWeight="600" textAnchor="middle" dominantBaseline="middle">
                {item.label}
              </text>
            </g>
          );
        })}
        <polygon points={toPolyline(actualPoints)} fill="rgba(37,99,235,.18)" stroke="#2563eb" strokeWidth="2.2" />
        {actualPoints.map((point, index) => (
          <circle key={items[index].label} cx={point.x} cy={point.y} r="4.5" fill="#2563eb" stroke="#fff" strokeWidth="2" />
        ))}
        <circle cx={center} cy={center} r="3.5" fill="#1e3a6e" />
      </svg>
    </div>
  );
}

function BurndownChart({ labels, planned, actual }) {
  const width = 620;
  const height = 170;
  const padding = 24;
  const maxValue = Math.max(...planned, ...actual);

  function toPath(values) {
    return values.map((value, index) => {
      const x = padding + (index * (width - padding * 2)) / (values.length - 1);
      const y = height - padding - (value / maxValue) * (height - padding * 2);
      return `${index === 0 ? "M" : "L"} ${x} ${y}`;
    }).join(" ");
  }

  return (
    <div style={{ marginTop: 2 }}>
      <svg width="100%" height="170" viewBox={`0 0 ${width} ${height}`} fill="none" preserveAspectRatio="none">
        {[0, .25, .5, .75, 1].map(level => {
          const y = height - padding - level * (height - padding * 2);
          return <line key={level} x1={padding} y1={y} x2={width - padding} y2={y} stroke="#e8f1fd" strokeWidth="1" />;
        })}
        <path d={toPath(planned)} stroke="#93c5fd" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="6 6" />
        <path d={toPath(actual)} stroke="#2563eb" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
        {actual.map((value, index) => {
          const x = padding + (index * (width - padding * 2)) / (actual.length - 1);
          const y = height - padding - (value / maxValue) * (height - padding * 2);
          return <circle key={labels[index]} cx={x} cy={y} r="4.5" fill="#2563eb" stroke="#fff" strokeWidth="2" />;
        })}
        {labels.map((label, index) => {
          const x = padding + (index * (width - padding * 2)) / (labels.length - 1);
          return <text key={label} x={x} y={height - 6} fill="#94a3b8" fontSize="11" fontWeight="600" textAnchor="middle">{label}</text>;
        })}
      </svg>
      <div style={{ display: "flex", gap: 16, marginTop: 6, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#64748b" }}>
          <span style={{ width: 18, height: 3, borderRadius: 3, background: "#2563eb" }}></span>
          Фактическое снижение
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#64748b" }}>
          <span style={{ width: 18, height: 3, borderRadius: 3, background: "#93c5fd" }}></span>
          Плановая траектория
        </div>
      </div>
    </div>
  );
}

// ---- TASK DETAIL / EDIT MODAL ----
function TaskDetailModal({ task, onClose, onSave, team = [] }) {
  const { isMobile } = useViewportFlags();
  const scrollRef = React.useRef(null);
  const touchStartY = React.useRef(0);
  const mobileDateInputRef = React.useRef(null);
  function formatDueForMobile(value) {
    if (!value || value === "—") return "";
    if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
      const [, , month, day] = value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return `${day}.${month}`;
    }
    return value;
  }
  function normalizeMobileDue(value) {
    const text = String(value || "").trim();
    if (!text || text === "—") return "";
    const full = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
    const short = text.match(/^(\d{1,2})[.\-/](\d{1,2})$/);
    if (!full && !short) return text;
    const day = (full?.[1] || short?.[1] || "").padStart(2, "0");
    const month = (full?.[2] || short?.[2] || "").padStart(2, "0");
    const year = full?.[3] || String(new Date().getFullYear());
    return `${year}-${month}-${day}`;
  }
  function openMobileDatePicker() {
    const node = mobileDateInputRef.current;
    if (!node) return;
    if (typeof node.showPicker === "function") {
      node.showPicker();
      return;
    }
    node.focus();
    node.click();
  }
  const [title, setTitle] = React.useState(task.title);
  const [description, setDescription] = React.useState(task.description || "");
  const [priority, setPriority] = React.useState(task.priority);
  const [column, setColumn] = React.useState(task.column);
  const [due, setDue] = React.useState(isMobile ? formatDueForMobile(task.due) : (task.due === "—" ? "" : task.due));
  const [assigneeId, setAssigneeId] = React.useState(task.assigneeId);
  const [error, setError] = React.useState("");

  const priColor = { "Высокий": "#ef4444", "Средний": "#f59e0b", "Низкий": "#10b981" };
  const colColor = { "Беклог": "#94a3b8", "В работе": "#2563eb", "Готов": "#10b981" };

  function handleSave() {
    if (!title.trim()) { setError("Введите название задачи"); return; }
    const normalizedDue = isMobile ? normalizeMobileDue(due) : due;
    onSave({ ...task, title: title.trim(), description: description.trim(), priority, column, due: normalizedDue || "—", assigneeId });
    onClose();
  }

  function handleBackdrop(e) { if (e.target === e.currentTarget) onClose(); }

  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  React.useEffect(() => {
    const scrollY = window.scrollY || window.pageYOffset || 0;
    const previousHtmlOverflow = document.documentElement.style.overflow;
    const previousBodyOverflow = document.body.style.overflow;
    const previousBodyPosition = document.body.style.position;
    const previousBodyTop = document.body.style.top;
    const previousBodyWidth = document.body.style.width;
    document.body.style.overflow = "hidden";
    document.documentElement.style.overflow = "hidden";
    if (isMobile) {
      document.body.style.position = "fixed";
      document.body.style.top = `-${scrollY}px`;
      document.body.style.width = "100%";
    }
    return () => {
      document.documentElement.style.overflow = previousHtmlOverflow;
      document.body.style.overflow = previousBodyOverflow;
      document.body.style.position = previousBodyPosition;
      document.body.style.top = previousBodyTop;
      document.body.style.width = previousBodyWidth;
      if (isMobile) window.scrollTo(0, scrollY);
    };
  }, [isMobile]);

  React.useEffect(() => {
    if (!isMobile) return;
    let startY = 0;
    function onTouchStart(event) {
      startY = event.touches?.[0]?.clientY || 0;
    }
    function onTouchMove(event) {
      const scroller = scrollRef.current;
      if (!scroller || !scroller.contains(event.target)) {
        event.preventDefault();
        return;
      }
      const scrollable = scroller.scrollHeight > scroller.clientHeight + 1;
      if (!scrollable) {
        event.preventDefault();
        return;
      }
      const currentY = event.touches?.[0]?.clientY || 0;
      const deltaY = currentY - startY;
      const atTop = scroller.scrollTop <= 0;
      const atBottom = Math.ceil(scroller.scrollTop + scroller.clientHeight) >= scroller.scrollHeight;
      if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
        event.preventDefault();
      }
    }
    document.addEventListener("touchstart", onTouchStart, { passive: true, capture: true });
    document.addEventListener("touchmove", onTouchMove, { passive: false, capture: true });
    return () => {
      document.removeEventListener("touchstart", onTouchStart, { capture: true });
      document.removeEventListener("touchmove", onTouchMove, { capture: true });
    };
  }, [isMobile]);

  function handleModalTouchStart(e) {
    touchStartY.current = e.touches?.[0]?.clientY || 0;
  }

  function handleModalTouchMove(e) {
    if (!isMobile) return;
    const scroller = scrollRef.current;
    if (!scroller || !scroller.contains(e.target)) {
      e.preventDefault();
      return;
    }
    const currentY = e.touches?.[0]?.clientY || 0;
    const deltaY = currentY - touchStartY.current;
    const atTop = scroller.scrollTop <= 0;
    const atBottom = Math.ceil(scroller.scrollTop + scroller.clientHeight) >= scroller.scrollHeight;
    if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
      e.preventDefault();
    }
  }

  const labelStyle = { fontSize: isMobile ? 11 : 12, fontWeight: 700, color: "#64748b", marginBottom: isMobile ? 5 : 6, display: "block", letterSpacing: .3 };
  const inputStyle = { width: "100%", padding: isMobile ? "10px 12px" : "10px 14px", borderRadius: isMobile ? 12 : 10, border: "1.5px solid #e2edf8", fontSize: 14, color: "#1e3a6e", fontFamily: "Inter", outline: "none", background: "#f8fafc", transition: "border-color .15s" };
  const owner = findTeamMember(team, task.ownerId);
  const assignee = findTeamMember(team, assigneeId);
  const segmentButtonStyle = (active, color) => ({
    flex: 1,
    minHeight: isMobile ? 32 : 40,
    padding: isMobile ? "5px 3px" : "9px 4px",
    borderRadius: isMobile ? 11 : 9,
    border: "1.5px solid " + (active ? color : "#e2edf8"),
    background: active ? color + "18" : "#f8fafc",
    color: active ? color : "#64748b",
    fontSize: isMobile ? 11 : 12,
    fontWeight: active ? 750 : 500,
    cursor: "pointer",
    fontFamily: "Inter",
    transition: "all .15s",
    lineHeight: 1.1,
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
  });
  function priorityIcon(value) {
    if (value === "Высокий") {
      return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3v6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="12.2" r="1.2" fill="currentColor"/></svg>;
    }
    if (value === "Средний") {
      return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 8h8" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
    }
    return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M5 6l3 3 3-3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  }
  function columnIcon(value) {
    if (value === "Беклог") {
      return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 5h8M4 8h8M4 11h5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>;
    }
    if (value === "В работе") {
      return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l5 4-5 4V4z" fill="currentColor"/></svg>;
    }
    return <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3.5 8.3l3 3 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  }

  return (
    <div onClick={handleBackdrop} onTouchStart={handleModalTouchStart} onTouchMove={handleModalTouchMove} style={{ position: "fixed", inset: 0, background: "rgba(15,30,70,.38)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)", padding: isMobile ? "calc(var(--safe-top) + 14px) 14px calc(var(--mobile-tabbar-height) + var(--safe-bottom) + 14px)" : 0, overscrollBehavior: "none", touchAction: isMobile ? "none" : "auto" }}>
      <div style={{ background: "#fff", borderRadius: isMobile ? 22 : 20, width: isMobile ? "100%" : "min(92vw, 560px)", height: isMobile ? "min(66dvh, 610px)" : undefined, maxHeight: isMobile ? "min(66dvh, 610px)" : "92vh", display: "flex", flexDirection: "column", boxShadow: "0 24px 64px rgba(37,99,235,.22)", animation: "modalIn .2s ease", overflow: "hidden", touchAction: "auto" }}>

        {/* Header */}
        <div style={{ padding: isMobile ? "14px 18px 10px" : "22px 28px 18px", borderBottom: "1px solid #e8f1fd", display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexShrink: 0 }}>
          <div style={{ flex: 1, paddingRight: 16 }}>
            <div style={{ fontSize: isMobile ? 17 : 16, fontWeight: 800, color: "#1e3a6e", lineHeight: 1.2 }}>Редактирование задачи</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: isMobile ? 6 : 8, flexWrap: "wrap" }}>

            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>

// ---- TASKS SECTION ----
function TasksSection({ initialTasks = INIT_TASKS, team = [], api, onError, currentUser = null }) {
  const { isCompact, isMobile } = useViewportFlags();
  const [confirmDelete, confirmDialog] = useConfirmDialog();
  const [tasks, setTasks] = React.useState(initialTasks);
  const [showModal, setShowModal] = React.useState(false);
  const [editTask, setEditTask] = React.useState(null);
  const [dragOverCol, setDragOverCol] = React.useState(null);
  const [draggingId, setDraggingId] = React.useState(null);

  // Filters
  const [filterAssignee, setFilterAssignee] = React.useState("all");
  const [filterPriority, setFilterPriority] = React.useState("all");
  const [mobileColumn, setMobileColumn] = React.useState("all");
  const [scopeFilter, setScopeFilter] = React.useState("all");
  const currentUserId = currentUser?.id ?? null;

  const COLUMNS = ["Беклог", "В работе", "Готов"];
  const colColor  = { "Беклог": "#64748b", "В работе": "#2563eb", "Готов": "#10b981" };
  const colBg     = { "Беклог": "#f1f5f9", "В работе": "#eff6ff", "Готов": "#f0fdf4" };
  const colBorder = { "Беклог": "#e2edf8", "В работе": "#bdd7f5", "Готов": "#bbf7d0" };
  const colDropBg = { "Беклог": "#e8edf5", "В работе": "#dbeafe", "Готов": "#dcfce7" };

  React.useEffect(() => setTasks(initialTasks), [initialTasks]);

  async function changeAssignee(taskId, newId) {
    try {
      const updated = await api.patchTask(taskId, { assigneeId: newId });
      setTasks(ts => ts.map(t => t.id === taskId ? updated : t));
    } catch (error) {
      onError(error);
    }
  }

  async function moveTask(taskId, newCol) {
    try {
      const updated = await api.patchTask(taskId, { column: newCol });
      setTasks(ts => ts.map(t => t.id === taskId ? updated : t));
    } catch (error) {
      onError(error);
    }
  }

  async function addTask(data) {
    try {
      const created = await api.createTask(data);
      setTasks(ts => [...ts, created]);
    } catch (error) {
      onError(error);
    }
  }

  async function saveTask(updated) {
    try {
      const saved = await api.patchTask(updated.id, updated);
      setTasks(ts => ts.map(t => t.id === saved.id ? saved : t));
    } catch (error) {
      onError(error);
    }
  }

  async function deleteTask(taskId) {
    const task = tasks.find(item => item.id === taskId);
    const confirmed = await confirmDelete({
      title: "Удалить задачу?",
      message: "Задача сразу исчезнет из доски. Это действие нельзя отменить.",
      itemTitle: task?.title,
      confirmText: "Удалить",
    });
    if (!confirmed) return;
    try {
      await api.deleteTask(taskId);
      setTasks(ts => ts.filter(t => t.id !== taskId));
      if (editTask?.id === taskId) setEditTask(null);
    } catch (error) {
      onError(error);
    }
  }

  // Drag handlers on columns
  function handleDragOver(e, col) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDragOverCol(col);
  }

  function handleDrop(e, col) {
    e.preventDefault();
    const id = Number(e.dataTransfer.getData("taskId"));
    if (id) moveTask(id, col);
    setDragOverCol(null);
    setDraggingId(null);
  }

  function handleDragLeave(e) {
    if (!e.currentTarget.contains(e.relatedTarget)) setDragOverCol(null);
  }

  const scopeTasks = tasks.filter(t => {
    if (scopeFilter === "owned") return currentUserId != null && t.ownerId === currentUserId;
    if (scopeFilter === "assigned") return currentUserId != null && t.assigneeId === currentUserId;
    if (scopeFilter === "unassigned") return !t.assigneeId;
    return true;
  });

  // Filtered tasks
  const filtered = scopeTasks.filter(t => {
    const matchAssignee = filterAssignee === "all" || String(t.assigneeId) === filterAssignee;
    const matchPriority = filterPriority === "all" || t.priority === filterPriority;
    return matchAssignee && matchPriority;
  });
  const mobileStatusFilter = [...COLUMNS, "all", "unassigned"].includes(mobileColumn) ? mobileColumn : "all";
  const mobileFiltered = filtered.filter(t => {
    if (mobileStatusFilter === "Готов") return t.column === "Готов";
    if (mobileStatusFilter === "unassigned") return !t.assigneeId && t.column !== "Готов";
    if (mobileStatusFilter === "all") return t.column !== "Готов";
    return t.column === mobileStatusFilter;
  });

  const filterBtnStyle = (active) => ({
    padding: "5px 12px", borderRadius: 20, border: "1.5px solid " + (active ? "#2563eb" : "#e2edf8"),
    background: active ? "#eff6ff" : "#fff", color: active ? "#2563eb" : "#64748b",
    fontSize: 12, fontWeight: active ? 600 : 400, cursor: "pointer", fontFamily: "Inter", transition: "all .15s", whiteSpace: "nowrap"
  });

  const scopeControls = (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
      {[
        { id: "all", label: "Все доступные" },
        { id: "owned", label: "Созданные мной" },
        { id: "assigned", label: "Назначенные мне" },
        { id: "unassigned", label: "Без исполнителя" },
      ].map(option => (
        <button key={option.id} onClick={() => setScopeFilter(option.id)} style={filterBtnStyle(scopeFilter === option.id)}>
          {option.label}
        </button>
      ))}
    </div>
  );

  if (isMobile) {
    const mobileSelectStyle = {
      width: "100%",
      height: 40,
      borderRadius: 12,
      border: "1.5px solid #dbeafe",
      background: "#f8fbff",
      color: "#1e3a6e",
      padding: "0 8px",
      fontFamily: "Inter",
      fontSize: 12,
      fontWeight: 800,
      outline: "none",
    };
    const mobileFilterLabel = {
      fontSize: 8,
      fontWeight: 850,
      color: "#94a3b8",
      letterSpacing: .45,
      textTransform: "uppercase",
      marginBottom: 5,
    };
    const mobileListTitle =
      mobileStatusFilter === "Готов" ? "Готовые задачи" :
      mobileStatusFilter === "unassigned" ? "Без исполнителя" :
      "Активные задачи";
    const mobileStatButton = (active) => ({
      width: "100%",
      border: "1.5px solid " + (active ? "#93c5fd" : "transparent"),
      borderRadius: 12,
      background: "transparent",
      padding: 0,
      cursor: "pointer",
      fontFamily: "Inter",
      textAlign: "left",
      boxShadow: active ? "0 0 0 2px rgba(37,99,235,.08)" : "none",
    });

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {confirmDialog}
        {showModal && <AddTaskModal onClose={() => setShowModal(false)} onAdd={addTask} team={team} />}
        {editTask && <TaskDetailModal task={editTask} onClose={() => setEditTask(null)} onSave={saveTask} team={team} />}

        {scopeControls}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, minmax(0, 1fr))", gap: 6 }}>
          <button onClick={() => setMobileColumn("all")} style={mobileStatButton(mobileStatusFilter === "all")}>
            <StatCard compact label="Всего задач" value={scopeTasks.length} sub="на доске" color="#1e3a6e"/>
          </button>
          <button onClick={() => setMobileColumn("В работе")} style={mobileStatButton(mobileStatusFilter === "В работе")}>
            <StatCard compact label="В работе" value={scopeTasks.filter(t=>t.column==="В работе").length} sub="активных" color="#2563eb"/>
          </button>

                {/* Drop hint */}
                {isOver && draggingId && (

}

// ---- OTHER SECTIONS (placeholders) ----
function EventsSection({ initialEvents = null, initialEventTasks = null, team = [], api, onError, currentUser = null }) {
  const { isCompact, isMobile } = useViewportFlags();
  const [confirmDelete, confirmDialog] = useConfirmDialog();
  const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
  const today = React.useMemo(() => getRoadmapToday(), []);
  const TODAY_MONTH = today.month;
  const TODAY_DAY = today.day;
  const todayPct = (TODAY_MONTH + (TODAY_DAY - 1) / 31) / 12;

  const TYPE_OPTIONS = ["Совещание","Мероприятие","Релиз","Дедлайн","Планирование"];
  const TYPE_COLOR = { "Совещание":"#2563eb","Мероприятие":"#8b5cf6","Релиз":"#10b981","Дедлайн":"#ef4444","Планирование":"#f59e0b" };

  const [events, setEvents] = React.useState(() => Array.isArray(initialEvents) ? initialEvents : []);
  const [eventTasks, setEventTasks] = React.useState(() => initialEventTasks || {});
  const [selectedId,  setSelectedId]  = React.useState(() => initialEvents?.[0]?.id || null);
  const [showAddEvent, setShowAddEvent] = React.useState(false);
  const [showAddTask,  setShowAddTask]  = React.useState(false);
  const [editEvent, setEditEvent] = React.useState(null);
  const [selectedTask, setSelectedTask] = React.useState(null);

  React.useEffect(() => {
    if (!Array.isArray(initialEvents)) return;
    setEvents(initialEvents);
    setSelectedId(current => initialEvents.some(item => item.id === current) ? current : (initialEvents[0]?.id || null));
  }, [initialEvents]);

  React.useEffect(() => {
    if (initialEventTasks) setEventTasks(initialEventTasks);
  }, [initialEventTasks]);

  const daysToYearEnd = React.useMemo(() => {
    const now = new Date();
    const referenceDate = now.getFullYear() === ROADMAP_YEAR
      ? now
      : new Date(ROADMAP_YEAR, TODAY_MONTH, TODAY_DAY);
    const endOfYear = new Date(ROADMAP_YEAR, 11, 31);
    return Math.max(0, Math.ceil((endOfYear - referenceDate) / (1000 * 60 * 60 * 24)));
  }, [TODAY_DAY, TODAY_MONTH]);

  const selectedEvent = events.find(e => e.id === selectedId) || null;
  const tasks = (selectedId && eventTasks[selectedId]) || [];

  async function addEvent(data) {
    try {
      const created = await api.createEvent(data);
      setEvents(es => [...es, created]);
      setSelectedId(created.id);
    } catch (error) {
      onError(error);
    }
  }

  async function saveEvent(eventId, data) {
    try {
      const updated = await api.patchEvent(eventId, data);
      setEvents(es => es.map(item => item.id === updated.id ? updated : item));
      setSelectedId(updated.id);
    } catch (error) {
      onError(error);
    }
  }

  async function deleteEvent(eventId) {
    const event = events.find(item => item.id === eventId);
    const relatedCount = (eventTasks[eventId] || []).length;
    const confirmed = await confirmDelete({
      title: "Удалить событие?",
      message: relatedCount
        ? `Вместе с событием будут удалены связанные задачи: ${relatedCount}. Восстановить их не получится.`
        : "Событие будет удалено без возможности восстановления.",
      itemTitle: event?.title,
      confirmText: "Удалить событие",
    });
    if (!confirmed) return;
    try {
      await api.deleteEvent(eventId);
      setEvents(es => {
        const next = es.filter(item => item.id !== eventId);
        if (selectedId === eventId) setSelectedId(next[0]?.id || null);
        return next;
      });
      setEventTasks(et => {
        const next = { ...et };
        delete next[eventId];
        return next;
      });
    } catch (error) {
      onError(error);
    }
  }

  async function addTask(eventId, data) {
    try {
      const created = await api.createEventTask(eventId, data);
      setEventTasks(et => ({
        ...et,
        [eventId]: [...(et[eventId] || []), created]
      }));
    } catch (error) {
      onError(error);
    }
  }

  async function saveEventTask(eventId, taskId, data) {
    try {
      const updated = await api.patchEventTask(eventId, taskId, data);
      setEventTasks(et => ({
        ...et,
        [eventId]: (et[eventId] || []).map(t => t.id === taskId ? updated : t)
      }));
      setSelectedTask(null);
    } catch (error) {
      onError(error);
    }
  }

  async function deleteEventTask(eventId, taskId) {
    const task = (eventTasks[eventId] || []).find(item => item.id === taskId);
    const confirmed = await confirmDelete({
      title: "Удалить задачу события?",
      message: "Задача исчезнет из списка подготовки к событию. Это действие нельзя отменить.",
      itemTitle: task?.title,
      confirmText: "Удалить",
    });
    if (!confirmed) return;
    try {
      await api.deleteEventTask(eventId, taskId);
      setEventTasks(et => ({
        ...et,
        [eventId]: (et[eventId] || []).filter(t => t.id !== taskId)
      }));
      if (selectedTask?.task?.id === taskId) setSelectedTask(null);
    } catch (error) {
      onError(error);
    }
  }

  async function toggleTask(eventId, taskId) {
    const current = (eventTasks[eventId] || []).find(t => t.id === taskId);
    if (!current) return;
    try {
      const updated = await api.patchEventTask(eventId, taskId, { done: !current.done });
      setEventTasks(et => ({
        ...et,
        [eventId]: et[eventId].map(t => t.id === taskId ? updated : t)
      }));
    } catch (error) {
      onError(error);
    }
  }

  function getEventPct(ev) { return (ev.month + (ev.day - 1) / 31) / 12; }

  // Anti-collision: assign each event a side (top/bottom) and a level within that side
  // so labels never overlap horizontally
  const LABEL_W_PCT = 0.13; // approx label width as fraction of timeline width

  function assignLevels(evList) {
    // Sort by x position
    const sorted = [...evList].sort((a, b) => getEventPct(a) - getEventPct(b));
    // Separate into top/bottom alternating first pass
    const top = [], bottom = [];
    sorted.forEach((ev, i) => (i % 2 === 0 ? top : bottom).push(ev));

    function computeLevels(group) {
      // Pre-seed level 0 with the "Сегодня" label so events near it get bumped
      const TODAY_LABEL_W = 0.08; // "Сегодня" badge is ~70px wide
      const levels = [[{ pct: todayPct }]]; // level 0 reserved around today
      return group.map(ev => {
        const pct = getEventPct(ev);
        let l = 0;
        while (true) {
          if (!levels[l]) levels[l] = [];
          const collision = levels[l].some(p => Math.abs(p.pct - pct) < LABEL_W_PCT);
          if (!collision) { levels[l].push({ pct }); return { ...ev, level: l }; }
          l++;
        }
      });
    }

    return {
      topEvents:    computeLevels(top),
      bottomEvents: computeLevels(bottom),
    };
  }

  const { topEvents, bottomEvents } = React.useMemo(() => assignLevels(events), [events]);

  function EventModal({ event, onClose, onSubmit }) {
    const isEdit = Boolean(event);
    const [title, setTitle] = React.useState(event?.title || "");
    const [description, setDescription] = React.useState(event?.description || "");
    const [type,  setType]  = React.useState(event?.type || "Совещание");
    const [month, setMonth] = React.useState(event?.month ?? TODAY_MONTH);
    const [day,   setDay]   = React.useState(event?.day ?? TODAY_DAY);
    const [done, setDone] = React.useState(Boolean(event?.done));
    const [error, setError] = React.useState("");

    React.useEffect(() => {
      const fn = e => { if (e.key === "Escape") onClose(); };
      window.addEventListener("keydown", fn);
      return () => window.removeEventListener("keydown", fn);
    }, []);

    function handleSave() {
      if (!title.trim()) { setError("Введите название"); return; }
      onSubmit({ title: title.trim(), description: description.trim(), type, month: Number(month), day: Number(day), done });
      onClose();
    }

    const lbl = { fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6, display:"block", letterSpacing:.3 };
    const inp = { width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2edf8", fontSize:14, color:"#1e3a6e", fontFamily:"Inter", outline:"none", background:"#f8fafc" };

    return (
      <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position:"fixed", inset:0, background:"rgba(15,30,70,.38)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)" }}>
        <div style={{ background:"#fff", borderRadius:20, width:"min(92vw, 460px)", boxShadow:"0 24px 64px rgba(37,99,235,.22)", animation:"modalIn .2s ease" }}>
          <div style={{ padding:"22px 28px 18px", borderBottom:"1px solid #e8f1fd", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:16, fontWeight:700, color:"#1e3a6e" }}>{isEdit ? "Редактирование события" : "Новое событие"}</div>
              <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{isEdit ? "Измените поля события" : "Добавьте событие на дорожную карту"}</div>
            </div>
            <button onClick={onClose} style={{ width:32, height:32, borderRadius:"50%", border:"none", background:"#f0f6ff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="#64748b" strokeWidth="1.6" strokeLinecap="round"/></svg>
            </button>
          </div>
          <div style={{ padding:"22px 28px", display:"flex", flexDirection:"column", gap:16 }}>
            <div>
              <label style={lbl}>Название события *</label>
              <input autoFocus value={title} onChange={e => { setTitle(e.target.value); setError(""); }}
                placeholder="Например: Запуск нового продукта"
                style={{ ...inp, borderColor: error ? "#ef4444" : "#e2edf8" }}
                onFocus={e => e.target.style.borderColor = "#93c5fd"}
                onBlur={e => e.target.style.borderColor = error ? "#ef4444" : "#e2edf8"} />
              {error && <div style={{ fontSize:12, color:"#ef4444", marginTop:4 }}>{error}</div>}
            </div>
            <div>
              <label style={lbl}>Тип события</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {TYPE_OPTIONS.map(t => (
                  <button key={t} onClick={() => setType(t)} style={{ padding:"7px 12px", borderRadius:8, border:"1.5px solid "+(type===t?TYPE_COLOR[t]:"#e2edf8"), background:type===t?TYPE_COLOR[t]+"18":"#f8fafc", color:type===t?TYPE_COLOR[t]:"#64748b", fontSize:12, fontWeight:type===t?600:400, cursor:"pointer", fontFamily:"Inter", transition:"all .15s" }}>{t}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={lbl}>Описание</label>
              <textarea value={description} onChange={e => setDescription(e.target.value)} rows={3} placeholder="Контекст, цель или важные детали события" style={{ ...inp, resize:"vertical", lineHeight:1.55, minHeight:90, maxHeight:220 }} />
            </div>
            <div style={{ display:"flex", gap:14 }}>
              <div style={{ flex:1 }}>
                <label style={lbl}>Месяц</label>

        </div>
      </div>

  // Add Task Modal
  function AddTaskModal({ eventId, onClose, onAdd }) {
    const [title,      setTitle]      = React.useState("");

      if (!title.trim()) { setError("Введите название задачи"); return; }

      onClose();

            <button onClick={onClose} style={{ width:32, height:32, borderRadius:"50%", border:"none", background:"#f0f6ff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>

            </button>

          <div style={{ padding:"22px 28px", display:"flex", flexDirection:"column", gap:16 }}>

              {error && <div style={{ fontSize:12, color:"#ef4444", marginTop:4 }}>{error}</div>}
            </div>
            <div style={{ display:"flex", gap:14 }}>
              <div style={{ flex:1 }}>
                <label style={lbl}>Исполнитель</label>
                <div style={{ position:"relative" }}>
                  <select value={assigneeId || ""} onChange={e => setAssigneeId(e.target.value ? Number(e.target.value) : null)}
                    style={{ ...inp, cursor:"pointer", paddingLeft: assignee ? 40 : 14 }}>
                    <option value="">— Не назначен —</option>
                    {team.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                  {assignee && (
                    <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", width:22, height:22, borderRadius:"50%", background:assignee.color, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:8, fontWeight:700, pointerEvents:"none" }}>{assignee.initials}</div>

              </div>
              <div style={{ flex:1 }}>
                <label style={lbl}>Срок выполнения</label>
                <input type="date" value={due} onChange={e => setDue(e.target.value)} style={inp}
                  onFocus={e => e.target.style.borderColor = "#93c5fd"}
                  onBlur={e => e.target.style.borderColor = "#e2edf8"} />
              </div>
            </div>
            <div>
              <label style={lbl}>Описание</label>
              <textarea value={description} onChange={e => setDescription(e.target.value)} rows={3} placeholder="Контекст задачи, ожидания или результат" style={{ ...inp, resize:"vertical", lineHeight:1.55, minHeight:90, maxHeight:220 }} />
            </div>
          </div>
          <div style={{ padding:"16px 28px 24px", display:"flex", gap:10, justifyContent:"flex-end", borderTop:"1px solid #f0f6ff" }}>
            <button onClick={onClose} style={{ padding:"10px 20px", borderRadius:10, border:"1.5px solid #e2edf8", background:"#f8fafc", color:"#64748b", fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"Inter" }}>Отмена</button>
            <button onClick={handleSave} style={{ padding:"10px 24px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#2563eb,#3b82f6)", color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"Inter", boxShadow:"0 4px 12px rgba(37,99,235,.3)" }}>Добавить задачу</button>
          </div>
        </div>
      </div>
    );
  }

            </div>
            <button onClick={onClose} style={{ width:32, height:32, borderRadius:"50%", border:"none", background:"#f0f6ff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="#64748b" strokeWidth="1.6" strokeLinecap="round"/></svg>

          </div>
          <div style={{ padding:"22px 28px", display:"flex", flexDirection:"column", gap:16 }}>

          </div>

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      {confirmDialog}
      {showAddEvent && <EventModal onClose={() => setShowAddEvent(false)} onSubmit={addEvent} />}
      {editEvent && <EventModal event={editEvent} onClose={() => setEditEvent(null)} onSubmit={(patch) => { saveEvent(editEvent.id, patch); setEditEvent(null); }} />}
      {showAddTask && selectedEvent && <AddTaskModal eventId={selectedId} onClose={() => setShowAddTask(false)} onAdd={addTask} />}
      {selectedTask && <EventTaskModal eventId={selectedTask.eventId} task={selectedTask.task} onClose={() => setSelectedTask(null)} onSave={saveEventTask} />}

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:isMobile ? "repeat(4, minmax(0, 1fr))" : "repeat(4, minmax(180px, 1fr))", gap:isMobile ? 6 : 14 }}>

        <StatCard compact={isMobile} label="Завершено" value={events.filter(e=>e.done).length} sub="пройдено" color="#10b981"/>
        <StatCard compact={isMobile} label="Предстоит" value={events.filter(e=>!e.done).length} sub="впереди" color="#2563eb"/>

                <div key={t} style={{ display:"flex", alignItems:"center", gap:5 }}>

                    style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 12, alignItems: "center", minHeight: 58, width: "100%", padding: "10px 12px", borderRadius: 14, border: "1.5px solid " + (isSel ? TYPE_COLOR[ev.type] : "#e2edf8"), background: isSel ? TYPE_COLOR[ev.type] + "12" : "#f8fbff", textAlign: "left", fontFamily: "Inter", color: "#1e3a6e", cursor: "pointer" }}

                    <div style={{ width: 38, height: 38, borderRadius: 12, background: TYPE_COLOR[ev.type] + "18", display: "flex", alignItems: "center", justifyContent: "center" }}>

                    </div>
                    <div style={{ fontSize: 12, fontWeight: 800, color: ev.done ? "#10b981" : "#2563eb" }}>{ev.done ? "✓" : "→"}</div>

        ) : (
        <div style={{ overflowX:"auto", paddingBottom:4 }}>
          <div style={{ position:"relative", paddingTop:60, paddingBottom:60, minWidth:isCompact ? 860 : "auto" }}>

          <div style={{ position:"relative", height: Math.max(1, Math.max(...topEvents.map(e=>e.level))+1) * 26 + 12 }}>

              const pct = getEventPct(ev);
              const isSel = selectedId === ev.id;

              const bottomOffset = ev.level * 26;
              return (
                <div key={ev.id} onClick={() => setSelectedId(ev.id)}

                <div key={ev.id} onClick={() => setSelectedId(ev.id)}

        </div>
