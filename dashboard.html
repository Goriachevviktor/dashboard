            <button onClick={handleSubmit} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "Inter", boxShadow: "0 4px 12px rgba(37,99,235,.3)" }}>{isEdit ? "Сохранить изменения" : "Создать задачу"}</button>
          </div>
        </div>
      </div>
    );
  }

  async function addTask(task) {
    try {
      const created = await api.createDevelopmentTask(task);
      setTasks(items => [...items, created]);
      setSelectedTaskId(created.id);
    } catch (error) {
      onError(error);
    }
  }

  async function saveTask(task) {
    try {
      const saved = await api.patchDevelopmentTask(task.id, task);
      setTasks(items => items.map(item => item.id === saved.id ? saved : item));
    } catch (error) {
      onError(error);
    }
  }

  function updateStatusDraft(taskId, status) {
    setTasks(items => items.map(item => item.id === taskId ? { ...item, status } : item));
    window.clearTimeout(statusTimers.current[taskId]);
    statusTimers.current[taskId] = window.setTimeout(async () => {
      try {
        const saved = await api.patchDevelopmentTask(taskId, { status });
        setTasks(items => items.map(item => item.id === saved.id ? saved : item));
      } catch (error) {
        onError(error);
      }
    }, 700);
  }

  function resizeStatusTextarea(node) {
    if (!node) return;
    node.style.height = "auto";
    node.style.height = Math.max(76, node.scrollHeight) + "px";
  }

  async function deleteTask(taskId) {
    const task = tasks.find(item => item.id === taskId);
    const confirmed = await confirmDelete({
      title: "Удалить задачу развития?",
      message: "Задача исчезнет из плана развития. Это действие нельзя отменить.",
      itemTitle: task?.title,
      confirmText: "Удалить",
    });
    if (!confirmed) return;
    try {
      await api.deleteDevelopmentTask(taskId);
      setTasks(items => items.filter(item => item.id !== taskId));
      if (selectedTaskId === taskId) setSelectedTaskId(null);
      if (editTask?.id === taskId) setEditTask(null);
    } catch (error) {
      onError(error);
    }
  }

  const completed = tasks.filter(task => (task.status || "").toLowerCase().includes("заверш")).length;
  const overdue = tasks.filter(task => task.due && new Date(task.due + "T23:59:59") < new Date()).length;
  const nearest = [...tasks].filter(task => task.due).sort((a, b) => a.due.localeCompare(b.due))[0];
  const selectedTask = tasks.find(task => task.id === selectedTaskId) || tasks[0] || null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {confirmDialog}
      {showCreate && <PlanTaskModal onClose={() => setShowCreate(false)} onSubmit={addTask} />}
      {editTask && <PlanTaskModal task={editTask} onClose={() => setEditTask(null)} onSubmit={(task) => { saveTask(task); setEditTask(null); }} />}

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, minmax(0, 1fr))" : "repeat(4, minmax(180px, 1fr))", gap: isMobile ? 6 : 14 }}>
        <StatCard compact={isMobile} label="Задач" value={tasks.length} sub="в плане" color="#1e3a6e"/>
        <StatCard compact={isMobile} label="Завершено" value={completed} sub="по статусу" color="#10b981"/>
        <StatCard compact={isMobile} label="Просрочено" value={overdue} sub="требуют внимания" color="#f59e0b"/>
        <StatCard compact={isMobile} label="Ближайший срок" value={nearest ? formatPlanDate(nearest.due) : "—"} sub={nearest?.title || "нет дат"} color="#2563eb"/>
      </div>

      <div style={{ background: "#fff", borderRadius: isMobile ? 18 : 16, padding: isMobile ? 14 : 24, boxShadow: "0 1px 3px rgba(37,99,235,.06), 0 4px 16px rgba(37,99,235,.05)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 14, alignItems: "flex-start", flexWrap: "wrap", marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: isMobile ? 18 : 14, fontWeight: isMobile ? 850 : 600, color: "#1e3a6e" }}>План развития</div>
            {!isMobile && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>Фиксируйте задачи развития, ожидаемый результат, метрики и текущие комментарии по статусу.</div>}
          </div>
          <button onClick={() => setShowCreate(true)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Inter", boxShadow: "0 2px 8px rgba(37,99,235,.25)" }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
            Создать задачу
          </button>
        </div>

        {tasks.length === 0 ? (
          <div style={{ padding: 28, borderRadius: 14, border: "1px dashed #bfdbfe", background: "#f8fbff", color: "#64748b", fontSize: 13, textAlign: "center" }}>В плане пока нет задач. Создайте первую задачу развития.</div>
        ) : (
          <React.Fragment>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fit, minmax(240px, 1fr))", gap: 12 }}>
              {tasks.map(task => {
                const tone = taskTone(task);
                const active = selectedTask?.id === task.id;
                return (
                  <button
                    key={task.id}
                    onClick={() => setSelectedTaskId(task.id)}
                    style={{
                      textAlign: "left",
                      padding: isMobile ? "12px" : "14px 16px",
                      minHeight: isMobile ? 88 : 104,
                      background: active ? "#eff6ff" : "#f8fafc",
                      borderRadius: 12,
                      border: "1.5px solid " + (active ? "#93c5fd" : "#e2edf8"),
                      cursor: "pointer",
                      fontFamily: "Inter",
                      boxShadow: active ? "0 8px 20px rgba(37,99,235,.10)" : "none",
                    }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 10, alignItems: "flex-start", marginBottom: 12 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: tone.color, background: tone.bg, padding: "3px 9px", borderRadius: 999 }}>{tone.label}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#2563eb", padding: "3px 9px", borderRadius: 999, whiteSpace: "nowrap" }}>Задача</span>
                    </div>
                    <div style={{ fontSize: isMobile ? 14 : 13, fontWeight: 750, color: "#1e3a6e", lineHeight: 1.35, minHeight: isMobile ? 0 : 36 }}>{task.title}</div>
                    <div style={{ display: "inline-flex", marginTop: 10, fontSize: 11, fontWeight: 600, color: tone.color, background: tone.bg, padding: "3px 9px", borderRadius: 999 }}>{compactStatus(task)}</div>
                  </button>
                );
              })}
            </div>

            {selectedTask && (
              <div style={{ marginTop: 18, padding: isMobile ? 14 : 18, background: "#f8fafc", borderRadius: 14, border: "1px solid #e2edf8" }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start", flexWrap: "wrap", marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#1e3a6e", lineHeight: 1.35 }}>{selectedTask.title}</div>
                    <div style={{ fontSize: 12, color: "#2563eb", fontWeight: 700, marginTop: 6 }}>{formatPlanDate(selectedTask.due)}</div>
                  </div>
                  <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                    <button onClick={() => setEditTask(selectedTask)} style={{ padding: "7px 12px", borderRadius: 8, border: "1px solid #dbeafe", background: "#fff", color: "#2563eb", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter" }}>Редактировать</button>
                    <button onClick={() => deleteTask(selectedTask.id)} title="Удалить задачу" style={{ width: 32, height: 32, borderRadius: 8, border: "1px solid #fecaca", background: "#fff", color: "#ef4444", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 4h8M5 4V3h4v1m-5 2 .4 5h5.2L10 6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  </div>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12 }}>
                  <div style={{ padding: 14, background: "#fff", borderRadius: 12, border: "1px solid #e8f1fd" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", letterSpacing: .7, textTransform: "uppercase", marginBottom: 8 }}>Описание задачи</div>
                    <div style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6 }}>{selectedTask.description || "Не указано"}</div>
                  </div>
                  <div style={{ padding: 14, background: "#fff", borderRadius: 12, border: "1px solid #e8f1fd" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", letterSpacing: .7, textTransform: "uppercase", marginBottom: 8 }}>Образ результата</div>
                    <div style={{ fontSize: 13, color: "#1e3a6e", lineHeight: 1.6 }}>{selectedTask.resultImage || "Не указан"}</div>
                  </div>
                  <div style={{ padding: 14, background: "#fff", borderRadius: 12, border: "1px solid #e8f1fd" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", letterSpacing: .7, textTransform: "uppercase", marginBottom: 8 }}>Метрика успеха</div>
                    <div style={{ fontSize: 13, color: "#1e3a6e", lineHeight: 1.6 }}>{selectedTask.successMetric || "Не указана"}</div>
                  </div>
                  <div style={{ padding: 14, background: "#fff", borderRadius: 12, border: "1px solid #e8f1fd" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", letterSpacing: .7, textTransform: "uppercase", marginBottom: 8 }}>Сроки задачи</div>
                    <div style={{ fontSize: 13, color: "#1e3a6e", lineHeight: 1.6 }}>{formatPlanDate(selectedTask.due)}</div>
                  </div>
                </div>

                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", letterSpacing: .7, textTransform: "uppercase", marginBottom: 8 }}>Статус / комментарий</div>
                  <textarea
                    value={selectedTask.status || ""}
                    onChange={e => {
                      resizeStatusTextarea(e.currentTarget);
                      updateStatusDraft(selectedTask.id, e.target.value);
                    }}
                    ref={resizeStatusTextarea}
                    rows={3}
                    placeholder="Напишите текущий статус, блокеры или следующий шаг..."
                    style={{ ...inputStyle, resize: "none", minHeight: 76, lineHeight: 1.5, background: "#fff", overflow: "hidden" }}
                  />
                </div>
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function initialsFromName(name, email) {
  const source = (name || email || "U").trim();
  const parts = source.split(/\s+/).filter(Boolean);
  if (parts.length > 1) return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
  return source.slice(0, 2).toUpperCase();
}

function AuthScreen({ onLogin }) {
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");

  async function handleSubmit(event) {
    event.preventDefault();
    setLoading(true);
    setError("");
    try {
      const result = await dashboardRequest("/auth/login", {
        method: "POST",
        body: JSON.stringify({ email, password }),
      });
      onLogin(result);
    } catch (err) {
      setError(err?.message || "Не удалось войти");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div style={{ minHeight: "100dvh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: "#eef6ff", padding: 20 }}>
      <form onSubmit={handleSubmit} style={{ width: "100%", maxWidth: 420, background: "#fff", border: "1px solid #dbeafe", borderRadius: 8, boxShadow: "0 18px 48px rgba(30,58,110,.12)", padding: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <div style={{ width: 42, height: 42, borderRadius: 8, background: "linear-gradient(135deg, #2563eb, #60a5fa)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="9" width="4" height="7" rx="1" fill="white"/>
              <rect x="7" y="5" width="4" height="11" rx="1" fill="white" opacity=".8"/>
              <rect x="12" y="2" width="4" height="14" rx="1" fill="white" opacity=".6"/>
            </svg>
          </div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#1e3a6e" }}>Вход в дашборд</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>Рабочее пространство команды</div>
          </div>
        </div>

        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Email</label>
        <input
          value={email}
          onChange={e => setEmail(e.target.value)}
          type="email"
          autoComplete="email"
          required
          style={{ width: "100%", height: 42, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 16 }}
        />

        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Пароль</label>
        <input
          value={password}
          onChange={e => setPassword(e.target.value)}
          type="password"
          autoComplete="current-password"
          required
          style={{ width: "100%", height: 42, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 18 }}
        />

        {error && (
          <div style={{ padding: "10px 12px", borderRadius: 8, background: "#fef2f2", border: "1px solid #fecaca", color: "#b91c1c", fontSize: 13, fontWeight: 600, marginBottom: 16 }}>
            {error}
          </div>
        )}

        <button
          type="submit"
          disabled={loading}
          style={{ width: "100%", height: 44, border: "none", borderRadius: 8, background: loading ? "#93c5fd" : "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 14, fontWeight: 700, cursor: loading ? "default" : "pointer", fontFamily: "Inter", boxShadow: "0 6px 16px rgba(37,99,235,.25)" }}
        >
          {loading ? "Входим..." : "Войти"}
        </button>
      </form>
    </div>
  );
}

function RegisterScreen({ inviteToken, onLogin }) {
  const [invite, setInvite] = React.useState(null);
  const [displayName, setDisplayName] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");

  React.useEffect(() => {
    let cancelled = false;
    async function loadInvite() {
      setLoading(true);
      setError("");
      try {
        const data = await dashboardRequest(`/auth/invites/${inviteToken}`);
        if (!cancelled) setInvite(data);
      } catch (err) {
        if (!cancelled) setError(err?.message || "Приглашение недоступно");
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    loadInvite();
    return () => { cancelled = true; };
  }, [inviteToken]);

  async function handleSubmit(event) {
    event.preventDefault();
    setSaving(true);
    setError("");
    try {
      const result = await dashboardRequest("/auth/register", {
        method: "POST",
        body: JSON.stringify({ token: inviteToken, displayName, password }),
      });
      window.history.replaceState({}, "", "/dashboard.html");
      onLogin(result);
    } catch (err) {
      setError(err?.message || "Не удалось зарегистрироваться");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div style={{ minHeight: "100dvh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: "#eef6ff", padding: 20 }}>
      <form onSubmit={handleSubmit} style={{ width: "100%", maxWidth: 440, background: "#fff", border: "1px solid #dbeafe", borderRadius: 8, boxShadow: "0 18px 48px rgba(30,58,110,.12)", padding: 28 }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#1e3a6e", marginBottom: 6 }}>Регистрация по приглашению</div>
        <div style={{ fontSize: 13, color: "#64748b", marginBottom: 22 }}>
          {loading ? "Проверяем приглашение..." : invite ? `Аккаунт для ${invite.email}` : "Приглашение не активно"}
        </div>
        {invite && (
          <>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Имя</label>
            <input value={displayName} onChange={e => setDisplayName(e.target.value)} required autoComplete="name" style={{ width: "100%", height: 42, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 16 }} />
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Пароль</label>
            <input value={password} onChange={e => setPassword(e.target.value)} type="password" required minLength={10} autoComplete="new-password" style={{ width: "100%", height: 42, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 18 }} />
          </>
        )}
        {error && <div style={{ padding: "10px 12px", borderRadius: 8, background: "#fef2f2", border: "1px solid #fecaca", color: "#b91c1c", fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
        {invite && <button type="submit" disabled={saving || loading} style={{ width: "100%", height: 44, border: "none", borderRadius: 8, background: saving ? "#93c5fd" : "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 14, fontWeight: 700, cursor: saving ? "default" : "pointer", fontFamily: "Inter", boxShadow: "0 6px 16px rgba(37,99,235,.25)" }}>{saving ? "Создаём аккаунт..." : "Зарегистрироваться"}</button>}
      </form>
    </div>
  );
}

function UsersSection({ api, onError }) {
  const { isMobile } = useViewportFlags();
  const [users, setUsers] = React.useState([]);
  const [invites, setInvites] = React.useState([]);
  const [email, setEmail] = React.useState("");
  const [role, setRole] = React.useState("member");
  const [inviteLink, setInviteLink] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const [editUser, setEditUser] = React.useState(null);

  const load = React.useCallback(async () => {
    setLoading(true);
    try {
      const [userRows, inviteRows] = await Promise.all([api.listUsers(), api.listInvites()]);
      setUsers(userRows);
      setInvites(inviteRows);
    } catch (err) {
      onError(err);
    } finally {
      setLoading(false);
    }
  }, [api, onError]);

  React.useEffect(() => { load(); }, [load]);

  async function createInvite(event) {
    event.preventDefault();
    try {
      const created = await api.createInvite({ email, role });
      const absolute = new URL(created.inviteUrl, window.location.origin).toString();

      setEmail("");
      setRole("member");

            <button type="submit" style={{ padding: "10px 22px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "Inter", boxShadow: "0 4px 12px rgba(37,99,235,.25)" }}>Сохранить</button>

        <div style={{ fontSize: 16, fontWeight: 700, color: "#1e3a6e", marginBottom: 14 }}>Новое приглашение</div>
        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Email коллеги</label>
        <input value={email} onChange={e => setEmail(e.target.value)} type="email" required style={{ width: "100%", height: 40, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 12 }} />
        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 7 }}>Роль</label>
        <select value={role} onChange={e => setRole(e.target.value)} style={{ width: "100%", height: 40, border: "1.5px solid #dbeafe", borderRadius: 8, padding: "0 12px", fontFamily: "Inter", fontSize: 14, outline: "none", marginBottom: 14, background: "#fff" }}>
          <option value="member">Участник</option>
          <option value="viewer">Наблюдатель</option>
          <option value="admin">Администратор</option>
        </select>
        <button type="submit" style={{ width: "100%", height: 40, border: "none", borderRadius: 8, background: "linear-gradient(135deg,#2563eb,#3b82f6)", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "Inter" }}>Создать ссылку</button>

      <div style={{ display: "grid", gap: 18 }}>

          <div style={{ fontSize: 16, fontWeight: 700, color: "#1e3a6e", marginBottom: 12 }}>Пользователи</div>
          {loading ? <div style={{ color: "#64748b", fontSize: 13 }}>Загрузка...</div> : users.map(user => {
            const color = userColor(user);
            return (
            <div key={user.id} onClick={() => setEditUser(user)} style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 12, padding: "10px 0", borderTop: "1px solid #eef5ff", alignItems: "center", cursor: "pointer" }}>
              <div style={{ width: 34, height: 34, borderRadius: "50%", background: color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 800 }}>{initialsFromName(user.displayName, user.email)}</div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: user.isActive === false ? "#94a3b8" : "#1e3a6e", textDecoration: user.isActive === false ? "line-through" : "none" }}>{user.displayName}</div>
                <div style={{ fontSize: 12, color: "#64748b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.email}</div>

                  <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M8.5 3.5l2 2L5.2 10.8H3.2V8.8L8.5 3.5z" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>

          ))}

}

// ---- APP ----
function App() {
  const { isCompact, isMobile } = useViewportFlags();
  const [active, setActive] = React.useState("tasks");
  const [collapsed, setCollapsed] = React.useState(false);
  const [authLoading, setAuthLoading] = React.useState(true);
  const [accessToken, setAccessToken] = React.useState("");
  const [currentUser, setCurrentUser] = React.useState(null);
  const [dashboardData, setDashboardData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [apiError, setApiError] = React.useState("");
  const [isOnline, setIsOnline] = React.useState(window.navigator.onLine);
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [standalone, setStandalone] = React.useState(isStandalonePwa());
  const [pushStatus, setPushStatus] = React.useState("idle");
  const visibleSections = SECTIONS.filter(s => !s.adminOnly || currentUser?.role === "admin");
  const section = visibleSections.find(s => s.id === active) || visibleSections[0];
  const sidebarCollapsed = isCompact ? true : collapsed;
  const topbarDate = formatDashboardDate(new Date());
  const userInitials = initialsFromName(currentUser?.displayName, currentUser?.email);
  const inviteToken = new URLSearchParams(window.location.search).get("invite");
  const onError = React.useCallback((error) => {
    setApiError(error?.message || "Ошибка API");
    window.setTimeout(() => setApiError(""), 5000);
  }, []);

  React.useEffect(() => {
    function handleOnline() { setIsOnline(true); }
    function handleOffline() { setIsOnline(false); }
    function handleBeforeInstallPrompt(event) {
      event.preventDefault();
      setInstallPrompt(event);
    }
    function handleInstalled() {
      setInstallPrompt(null);
      setStandalone(true);
    }

    window.addEventListener("online", handleOnline);
    window.addEventListener("offline", handleOffline);
    window.addEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
    window.addEventListener("appinstalled", handleInstalled);
    return () => {
      window.removeEventListener("online", handleOnline);
      window.removeEventListener("offline", handleOffline);
      window.removeEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
      window.removeEventListener("appinstalled", handleInstalled);
    };
  }, []);

  React.useEffect(() => {
    document.body.classList.toggle("dashboard-mobile", isMobile);
    return () => document.body.classList.remove("dashboard-mobile");
  }, [isMobile]);

  async function handleInstallClick() {
    if (!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice.catch(() => null);
    setInstallPrompt(null);
    setStandalone(isStandalonePwa());
  }

  async function enablePushNotifications({ silent = false } = {}) {
    if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) {
      setPushStatus("unsupported");
      if (!silent) onError(new Error("Push-уведомления не поддерживаются этим браузером"));
      return;
    }
    try {
      setPushStatus("loading");
      const keyInfo = await api.getPushPublicKey();
      if (!keyInfo.enabled || !keyInfo.publicKey) {
        setPushStatus("disabled");
        if (!silent) onError(new Error("Push-уведомления не настроены на сервере"));
        return;
      }
      const permission = Notification.permission === "granted" ? "granted" : await Notification.requestPermission();
      if (permission !== "granted") {
        setPushStatus(permission === "denied" ? "denied" : "idle");
        return;
      }
      const registration = await navigator.serviceWorker.ready;
      const existing = await registration.pushManager.getSubscription();
      const subscription = existing || await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(keyInfo.publicKey),
      });
      await api.savePushSubscription(subscription.toJSON());
      setPushStatus("enabled");
      if (!silent) await api.testPushNotification();
    } catch (error) {
      setPushStatus("error");
      if (!silent) onError(error);
    }
  }

  const authRequest = React.useCallback(async (path, options = {}) => {
    try {
      return await dashboardRequest(path, { ...options, authToken: accessToken });
    } catch (error) {
      if (error.status !== 401) throw error;
      const refreshed = await dashboardRequest("/auth/refresh", { method: "POST" });
      setAccessToken(refreshed.accessToken);
      setCurrentUser(refreshed.user);
      return dashboardRequest(path, { ...options, authToken: refreshed.accessToken });
    }
  }, [accessToken]);
  const api = React.useMemo(() => ({
    bootstrap: () => authRequest("/bootstrap"),
    createTask: (payload) => authRequest("/tasks", { method: "POST", body: JSON.stringify(payload) }),
    patchTask: (id, payload) => authRequest(`/tasks/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteTask: (id) => authRequest(`/tasks/${id}`, { method: "DELETE" }),
    createEvent: (payload) => authRequest("/events", { method: "POST", body: JSON.stringify(payload) }),
    patchEvent: (id, payload) => authRequest(`/events/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteEvent: (id) => authRequest(`/events/${id}`, { method: "DELETE" }),
    createEventTask: (eventId, payload) => authRequest(`/events/${eventId}/tasks`, { method: "POST", body: JSON.stringify(payload) }),
    patchEventTask: (eventId, taskId, payload) => authRequest(`/events/${eventId}/tasks/${taskId}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteEventTask: (eventId, taskId) => authRequest(`/events/${eventId}/tasks/${taskId}`, { method: "DELETE" }),
    createSticker: (payload) => authRequest("/sync-stickers", { method: "POST", body: JSON.stringify(payload) }),
    patchSticker: (id, payload) => authRequest(`/sync-stickers/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteSticker: (id) => authRequest(`/sync-stickers/${id}`, { method: "DELETE" }),
    createUcpTask: (payload) => authRequest("/ucp/tasks", { method: "POST", body: JSON.stringify(payload) }),
    patchUcpTask: (id, payload) => authRequest(`/ucp/tasks/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteUcpTask: (id) => authRequest(`/ucp/tasks/${id}`, { method: "DELETE" }),
    createDevelopmentTask: (payload) => authRequest("/development-tasks", { method: "POST", body: JSON.stringify(payload) }),
    patchDevelopmentTask: (id, payload) => authRequest(`/development-tasks/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteDevelopmentTask: (id) => authRequest(`/development-tasks/${id}`, { method: "DELETE" }),
    createAmbpTopic: (payload) => authRequest("/ambp-topics", { method: "POST", body: JSON.stringify(payload) }),
    patchAmbpTopic: (id, payload) => authRequest(`/ambp-topics/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    deleteAmbpTopic: (id) => authRequest(`/ambp-topics/${id}`, { method: "DELETE" }),
    listUsers: () => authRequest("/auth/users"),
    updateUser: (id, payload) => authRequest(`/auth/users/${id}`, { method: "PATCH", body: JSON.stringify(payload) }),
    listInvites: () => authRequest("/auth/invites"),
    createInvite: (payload) => authRequest("/auth/invites", { method: "POST", body: JSON.stringify(payload) }),
    getPushPublicKey: () => authRequest("/push/vapid-public-key"),
    savePushSubscription: (payload) => authRequest("/push/subscriptions", { method: "POST", body: JSON.stringify(payload) }),
    testPushNotification: () => authRequest("/push/test", { method: "POST" }),
  }), [authRequest]);

  React.useEffect(() => {
    let cancelled = false;
    async function restoreSession() {
      try {
        const result = await dashboardRequest("/auth/refresh", { method: "POST" });
        if (!cancelled) {
          setAccessToken(result.accessToken);
          setCurrentUser(result.user);
        }
      } catch (_) {
        if (!cancelled) {
          setAccessToken("");
          setCurrentUser(null);
        }
      } finally {
        if (!cancelled) setAuthLoading(false);
      }
    }
    restoreSession();
    return () => { cancelled = true; };
  }, []);

  React.useEffect(() => {
    if (!accessToken || !("Notification" in window)) return;
    if (Notification.permission === "granted") {
      enablePushNotifications({ silent: true });
    } else if (Notification.permission === "denied") {
      setPushStatus("denied");
    }
  }, [accessToken, api]);

  React.useEffect(() => {
    let cancelled = false;
    async function load() {
      if (!accessToken) {
        setLoading(false);
        return;
      }
      setLoading(true);
      try {
        const data = await api.bootstrap();
        if (!cancelled) setDashboardData(normalizeDashboardData(data, currentUser));
      } catch (error) {
        if (!cancelled) {
          setDashboardData(normalizeDashboardData({}, currentUser));
          onError(error);
        }
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [api, onError, active, accessToken, currentUser]);

  function handleLogin(result) {
    setLoading(true);
    setAccessToken(result.accessToken);
    setCurrentUser(result.user);
    setDashboardData(null);
    setApiError("");
  }

  async function handleLogout() {
    try {
      await dashboardRequest("/auth/logout", { method: "POST" });
    } catch (_) {}
    setAccessToken("");
    setCurrentUser(null);
    setDashboardData(null);
  }

  if (authLoading) {
    return (
      <div style={{ height: "100dvh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f0f6ff", color: "#64748b", fontSize: 14 }}>
        Проверяем сессию...
      </div>
    );
  }

  if (inviteToken && (!currentUser || !accessToken)) {
    return <RegisterScreen inviteToken={inviteToken} onLogin={handleLogin} />;
  }

  if (!currentUser || !accessToken) {
    return <AuthScreen onLogin={handleLogin} />;
  }
  const mobileNavSections = visibleSections.filter(s => s.id !== "users");
  const mobileNavButton = (isActive) => ({
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    flexDirection: "column",
    gap: 24,
    width: "100%",
    minWidth: 0,
    minHeight: 36,
    padding: "3px 1px",
    borderRadius: 14,
    border: "none",
    background: isActive ? "#eff6ff" : "transparent",
    color: isActive ? "#2563eb" : "#64748b",
    cursor: "pointer",
    fontFamily: "Inter",
    fontSize: 8,
    lineHeight: 1.1,
    fontWeight: 700,
    whiteSpace: "nowrap",
    flexShrink: 0,
    touchAction: "manipulation",
  });

  return (
    <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", height: "100dvh", width: "100%", overflow: "hidden", background: "#f0f6ff", paddingTop: isMobile ? "var(--safe-top)" : 0 }}>

      {/* LEFT SIDEBAR */}
      {!isMobile && <div style={{
        width: sidebarCollapsed ? 64 : "20%",
        minWidth: sidebarCollapsed ? 64 : 220,
        maxWidth: sidebarCollapsed ? 64 : 300,
        background: "#1e3a6e",
        display: "flex",
        flexDirection: "column",
        transition: "width .3s ease, min-width .3s ease",
        overflow: "hidden",
        flexShrink: 0
      }}>
        {/* Logo */}
        <div style={{ padding: sidebarCollapsed ? "20px 0" : "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,.08)", flexShrink: 0, display: "flex", alignItems: "center", gap: 12, justifyContent: sidebarCollapsed ? "center" : "flex-start" }}>
          <div style={{ width: 34, height: 34, borderRadius: 10, background: "linear-gradient(135deg, #3b82f6, #60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="9" width="4" height="7" rx="1" fill="white"/>
              <rect x="7" y="5" width="4" height="11" rx="1" fill="white" opacity=".8"/>
              <rect x="12" y="2" width="4" height="14" rx="1" fill="white" opacity=".6"/>
            </svg>
          </div>
          {!sidebarCollapsed && <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#fff", letterSpacing: -.2 }}>Дашборд</div>
            <div style={{ fontSize: 11, color: "#7fb3f5", marginTop: 1 }}>Руководитель</div>
          </div>}
        </div>

        {!sidebarCollapsed && <div style={{ padding: "16px 20px 8px", fontSize: 10, fontWeight: 600, color: "#4a7dbe", letterSpacing: 1.2, textTransform: "uppercase" }}>Навигация</div>}

        {/* NAV ITEMS */}
        <nav style={{ flex: 1, overflow: "auto", padding: sidebarCollapsed ? "8px 0" : "8px 10px", display: "flex", flexDirection: "column", gap: 2 }}>
          {visibleSections.map(s => {
            const isActive = s.id === active;
            return (
              <button key={s.id} onClick={() => setActive(s.id)}
                title={sidebarCollapsed ? s.label : undefined}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: sidebarCollapsed ? "12px 0" : "11px 14px", justifyContent: sidebarCollapsed ? "center" : "flex-start", borderRadius: sidebarCollapsed ? 0 : 10, border: "none", background: isActive ? "rgba(255,255,255,.13)" : "transparent", color: isActive ? "#fff" : "#7fb3f5", cursor: "pointer", fontFamily: "Inter", transition: "background .15s, color .15s", position: "relative", outline: "none", width: "100%" }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = "rgba(255,255,255,.06)"; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = "transparent"; }}>
                {isActive && !sidebarCollapsed && <div style={{ position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)", width: 3, height: 20, background: "#60a5fa", borderRadius: "0 2px 2px 0" }}></div>}
                <span style={{ color: isActive ? "#fff" : "#7fb3f5", flexShrink: 0 }}>{s.icon}</span>
                {!sidebarCollapsed && <span style={{ fontSize: 13, fontWeight: isActive ? 600 : 400, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.label}</span>}
              </button>
            );
          })}
        </nav>

        {/* BOTTOM */}
        <div style={{ borderTop: "1px solid rgba(255,255,255,.08)", padding: sidebarCollapsed ? "16px 0" : "16px 10px", display: "flex", flexDirection: "column", gap: 12, flexShrink: 0 }}>
          {!isCompact && (
            <button onClick={() => setCollapsed(!collapsed)}
              style={{ display: "flex", alignItems: "center", justifyContent: sidebarCollapsed ? "center" : "flex-start", gap: 8, background: "transparent", border: "none", color: "#4a7dbe", cursor: "pointer", padding: "4px 8px", borderRadius: 8, fontFamily: "Inter", fontSize: 12, outline: "none" }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ transform: sidebarCollapsed ? "rotate(180deg)" : "none", transition: "transform .3s" }}>
                <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              {!sidebarCollapsed && <span>Свернуть</span>}
            </button>
          )}
          {!sidebarCollapsed && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px", background: "rgba(255,255,255,.06)", borderRadius: 12 }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #3b82f6, #60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{userInitials}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{currentUser.displayName}</div>
                <div style={{ fontSize: 11, color: "#7fb3f5" }}>{currentUser.role === "admin" ? "Администратор" : "Участник"}</div>
              </div>
              <button onClick={handleLogout} title="Выйти" style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "rgba(255,255,255,.08)", color: "#7fb3f5", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
                  <path d="M8 5V4a2 2 0 0 1 2-2h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-5a2 2 0 0 1-2-2v-1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                  <path d="M12 10H3m0 0 3-3m-3 3 3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
          )}
        </div>
      </div>}

      {/* MAIN CONTENT */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
        {/* TOP BAR */}
        <div style={{ minHeight: isMobile ? 58 : 64, background: "#fff", borderBottom: "1px solid #e2edf8", display: "flex", alignItems: "center", padding: isMobile ? "10px 14px" : "0 32px", gap: isMobile ? 10 : 16, flexShrink: 0, flexWrap: "nowrap" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: isMobile ? 17 : 18, fontWeight: 750, color: "#1e3a6e", letterSpacing: -.3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{section.label}</div>
            {!isMobile && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 1 }}>{section.description}</div>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: isMobile ? 8 : 20, flexShrink: 0 }}>
            <div
              title={isOnline ? "Сеть доступна" : "Нет сети"}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 7,
                padding: isMobile ? "8px" : "7px 10px",
                borderRadius: 999,
                border: "1px solid " + (isOnline ? "#bbf7d0" : "#fecaca"),
                background: isOnline ? "#f0fdf4" : "#fef2f2",
                color: isOnline ? "#15803d" : "#b91c1c",
                fontSize: 12,
                fontWeight: 700,
                flexShrink: 0,
              }}
            >
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: "currentColor" }}></span>
              {!isMobile && (isOnline ? "Online" : "Offline")}
            </div>
            {installPrompt && !standalone && (
              <button
                onClick={handleInstallClick}
                title="Установить приложение"
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 7,
                  padding: "8px 12px",
                  borderRadius: 999,
                  border: "1px solid #bfdbfe",
                  background: "#eff6ff",
                  color: "#2563eb",
                  fontSize: 12,
                  fontWeight: 700,
                  cursor: "pointer",
                  fontFamily: "Inter",
                  flexShrink: 0,
                }}
              >
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M8 2v8m0 0 3-3m-3 3L5 7M3 12.5h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                {!isMobile && "Установить"}
              </button>
            )}
            {!isMobile && <div style={{ fontSize: 13, color: "#64748b" }}>{topbarDate}</div>}
            {!isMobile && <div style={{ width: 1, height: 24, background: "#e2edf8" }}></div>}
            <button
              onClick={() => enablePushNotifications()}
              title={pushStatus === "enabled" ? "Push-уведомления включены" : pushStatus === "denied" ? "Уведомления запрещены в настройках браузера" : "Включить push-уведомления"}
              style={{ width: isMobile ? 40 : "auto", minWidth: isMobile ? 40 : 36, height: isMobile ? 40 : 36, padding: isMobile ? 0 : "0 10px", gap: 7, borderRadius: 999, border: "1px solid " + (pushStatus === "enabled" ? "#bbf7d0" : pushStatus === "error" || pushStatus === "denied" ? "#fecaca" : "#dbeafe"), background: pushStatus === "enabled" ? "#f0fdf4" : pushStatus === "error" || pushStatus === "denied" ? "#fef2f2" : "#fff", color: pushStatus === "enabled" ? "#10b981" : pushStatus === "error" || pushStatus === "denied" ? "#ef4444" : "#64748b", cursor: pushStatus === "loading" ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "Inter", fontSize: 12, fontWeight: 700 }}
              disabled={pushStatus === "loading"}
            >
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M10 2a6 6 0 0 0-6 6v3l-1.5 2.5h15L16 11V8a6 6 0 0 0-6-6z" stroke="currentColor" strokeWidth="1.5" fill="none"/>
                <path d="M8.5 16a1.5 1.5 0 0 0 3 0" stroke="currentColor" strokeWidth="1.5" fill="none"/>
              </svg>
              {!isMobile && (pushStatus === "enabled" ? "Вкл" : pushStatus === "loading" ? "..." : "Push")}
            </button>
            <button onClick={handleLogout} title="Выйти" style={{ width: isMobile ? 40 : 36, height: isMobile ? 40 : 36, borderRadius: "50%", border: "none", background: "linear-gradient(135deg, #2563eb, #60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "Inter", flexShrink: 0 }}>{userInitials}</button>
          </div>
        </div>

        {/* CONTENT */}
        <div style={{ flex: 1, overflow: "auto", padding: isMobile ? "14px 14px calc(var(--mobile-tabbar-height) + var(--safe-bottom) + 18px)" : 28, WebkitOverflowScrolling: "touch" }}>
          {apiError && (
            <div style={{ position: "sticky", top: 0, zIndex: 50, marginBottom: 12, padding: "10px 14px", borderRadius: 10, background: "#fef2f2", border: "1px solid #fecaca", color: "#b91c1c", fontSize: 13, fontWeight: 600 }}>
              {apiError}
            </div>
          )}
          {!isOnline && (
            <div style={{ position: "sticky", top: apiError ? 48 : 0, zIndex: 49, marginBottom: 12, padding: "10px 14px", borderRadius: 10, background: "#fff7ed", border: "1px solid #fed7aa", color: "#9a3412", fontSize: 13, fontWeight: 600 }}>
              Нет подключения к сети. Интерфейс доступен, но сохранение изменений возобновится после подключения.
            </div>
          )}
          {loading || !dashboardData ? (
            <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 14 }}>
              Загрузка данных...
            </div>
          ) : (
            SECTION_COMPONENTS[section.id]({ data: dashboardData, api, onError, currentUser })
          )}
        </div>
        {isMobile && (
          <nav style={{ position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 120, padding: "5px 10px calc(5px + var(--safe-bottom))", background: "rgba(255,255,255,.96)", borderTop: "1px solid #dbeafe", boxShadow: "0 -8px 22px rgba(30,58,110,.09)", backdropFilter: "blur(14px)" }}>
            <div style={{ display: "grid", gridTemplateColumns: `repeat(${mobileNavSections.length}, minmax(0, 1fr))`, gap: 3, maxWidth: 560, margin: "0 auto", padding: "0 2px" }}>
              {mobileNavSections.map(s => {
                const isActive = s.id === active;
                return (
                  <button key={s.id} onClick={() => setActive(s.id)} style={mobileNavButton(isActive)} title={s.label}>
                    <span style={{ display: "flex", color: isActive ? "#2563eb" : "#94a3b8", transform: "scale(1.18)", transformOrigin: "center" }}>{s.icon}</span>
                    <span style={{ maxWidth: "100%", whiteSpace: "nowrap", fontSize: 8, lineHeight: 1, letterSpacing: 0 }}>{MOBILE_SECTION_LABELS[s.id] || s.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js", { scope: "/" }).catch(error => {
      console.warn("Service worker registration failed", error);
    });
  });
}
</script>
</body>
</html>
