<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a6e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Dashboard" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Дашборд руководителя</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa-maskable-icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #f0f6ff;
      }
      body {
        font-family: Inter, Arial, sans-serif;
      }
      #root {
        min-height: 100dvh;
      }
      body:not(.booted) #root {
        visibility: hidden;
      }
      #boot-status {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f6ff;
        color: #64748b;
        font-size: 14px;
        font-weight: 600;
      }
      body.booted #boot-status {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="boot-status">Загружаем дашборд...</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
