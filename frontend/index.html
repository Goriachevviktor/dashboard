<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a6e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Dashboard" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Дашборд руководителя</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa-maskable-icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #f0f6ff;
      }
      body {
        font-family: Inter, Arial, sans-serif;
      }
      #root {
        min-height: 100dvh;
      }
      body:not(.booted) #root {
        visibility: hidden;
      }
      #boot-status {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f0f6ff;
        color: #1e3a6e;
        font: 500 15px/1.5 Inter, system-ui, sans-serif;
        text-align: center;
        white-space: pre-wrap;
      }
      body.booted #boot-status {
        display: none;
      }
    </style>
    <script>
      (function () {
        function showBootError(message) {
          var node = document.getElementById('boot-status');
          if (!node) return;
          node.textContent = ['Ошибка загрузки дашборда.', String(message || 'Неизвестная ошибка'), '', 'Обновите страницу. Если ошибка останется, сообщите текст этой ошибки.'].join('\n');
        }
        window.addEventListener('error', function (event) {
          showBootError(event && event.message ? event.message : 'Не удалось загрузить JavaScript');
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          showBootError(reason && reason.message ? reason.message : String(reason || 'Unhandled promise rejection'));
        });
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount > 0) document.body.classList.add('booted');
          }, 1500);
        });
      })();
    </script>
  </head>
  <body>
    <div id="boot-status">Загружаем дашборд...</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
