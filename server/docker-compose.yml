name: dashboard

services:
  dashboard-db:
    image: postgres:16-alpine
    container_name: dashboard-db
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dashboard-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-api:
    build:
      context: ./api
    container_name: dashboard-api
    environment:
      DASHBOARD_DATABASE_URL: ${DASHBOARD_DATABASE_URL}
      DASHBOARD_API_TOKEN: ${DASHBOARD_API_TOKEN}
      DASHBOARD_CORS_ORIGINS: ${DASHBOARD_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DASHBOARD_TRUSTED_PROXY_CIDRS: ${DASHBOARD_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      DASHBOARD_JWT_SECRET: ${DASHBOARD_JWT_SECRET}
      DASHBOARD_COOKIE_SECURE: "true"
      DASHBOARD_ADMIN_EMAIL: ${DASHBOARD_ADMIN_EMAIL}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD}
      DASHBOARD_ADMIN_NAME: ${DASHBOARD_ADMIN_NAME}
      DASHBOARD_VAPID_PUBLIC_KEY: ${DASHBOARD_VAPID_PUBLIC_KEY}
      DASHBOARD_VAPID_PRIVATE_KEY_FILE: /run/secrets/vapid_private_key
      DASHBOARD_VAPID_CLAIMS_SUB: ${DASHBOARD_VAPID_CLAIMS_SUB}
    volumes:
      - ./vapid_private.pem:/run/secrets/vapid_private_key:ro
    depends_on:
      dashboard-db:
        condition: service_healthy
    expose:
      - "8000"

  dashboard-web:
    image: caddy:2-alpine
    container_name: dashboard-web
    depends_on:
      - dashboard-api
    expose:
      - "80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ..:/srv:ro
      - ../frontend-dist:/srv/frontend-dist:ro
    networks:
      - default
      - proxy_net

volumes:
  dashboard-db-data:

networks:
  proxy_net:
    external: true
