name: dashboard

services:
  dashboard-db:
    image: postgres:16-alpine
    container_name: dashboard-db
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard
    volumes:
      - dashboard-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-api:
    build:
      context: ./api
    container_name: dashboard-api
    environment:
      DASHBOARD_DATABASE_URL: postgresql://dashboard:dashboard@dashboard-db:5432/dashboard
      DASHBOARD_API_TOKEN: 0aeabd8e680e72e9f0a279d493e10b6157ec38b192ca415f
      DASHBOARD_CORS_ORIGINS: https://dashboard.goryachevviktor.crazedns.ru,http://dashboard.goryachevviktor.crazedns.ru,http://localhost:8080,http://127.0.0.1:8080
      DASHBOARD_JWT_SECRET: b931442e73dde15017ab7072f9cd9c2f8ffb25cda8b2dd11
      DASHBOARD_COOKIE_SECURE: "true"
      DASHBOARD_ADMIN_EMAIL: viktor@goryachevviktor.local
      DASHBOARD_ADMIN_PASSWORD: xDmLnsKSjsT3IHUzk53AlWbv
      DASHBOARD_ADMIN_NAME: Виктор
      DASHBOARD_VAPID_PUBLIC_KEY: BJjM4ntHCDPVtc9o0YNw5q041hXgprb9hFCxJFchaiWZnW5SSnAaT_198Nb5pQUngarkuYmZFIei4MZreHn1Cq0
      DASHBOARD_VAPID_PRIVATE_KEY_FILE: /app/app/vapid_private.pem
      DASHBOARD_VAPID_CLAIMS_SUB: mailto:viktor@goryachevviktor.local
    depends_on:
      dashboard-db:
        condition: service_healthy
    expose:
      - "8000"

  dashboard-web:
    image: caddy:2-alpine
    container_name: dashboard-web
    depends_on:
      - dashboard-api
    expose:
      - "80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ..:/srv:ro
    networks:
      - default
      - proxy_net

volumes:
  dashboard-db-data:

networks:
  proxy_net:
    external: true
