name: Deploy production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Full 40-character commit SHA from main
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate-sha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require an exact commit reachable from main
        env:
          RELEASE_SHA: ${{ inputs.sha }}
        run: |
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          git fetch origin main
          git cat-file -e "$RELEASE_SHA^{commit}"
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main

  deploy:
    needs: validate-sha
    runs-on: ubuntu-latest
    environment: production
    env:
      RELEASE_SHA: ${{ inputs.sha }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      RELEASE_ROOT: ${{ vars.RELEASE_ROOT }}
      SHARED_CONFIG_DIR: ${{ vars.SHARED_CONFIG_DIR }}
      PUBLIC_HEALTH_URL: ${{ vars.PUBLIC_HEALTH_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1
      - name: Validate deployment variables
        run: |
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          for value in "$DEPLOY_HOST" "$DEPLOY_PORT" "$DEPLOY_USER" "$RELEASE_ROOT" "$SHARED_CONFIG_DIR" "$PUBLIC_HEALTH_URL"; do
            [[ -n "$value" && "$value" =~ ^[A-Za-z0-9_./:@-]+$ ]]
          done
      - name: Package exact release
        run: |
          git archive --format=tar.gz --output="/tmp/dashboard-$RELEASE_SHA.tar.gz" "$RELEASE_SHA"
          tar -czf "/tmp/dashboard-deploy-$RELEASE_SHA.tar.gz" ops/deploy-release.sh ops/lib/release_helpers.sh
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      - name: Trust deployment host for this run
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload and deploy with backup
        run: |
          scp -P "$DEPLOY_PORT" \
            "/tmp/dashboard-$RELEASE_SHA.tar.gz" "/tmp/dashboard-deploy-$RELEASE_SHA.tar.gz" \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf /tmp/dashboard-deploy-$RELEASE_SHA && mkdir /tmp/dashboard-deploy-$RELEASE_SHA && \
             tar -xzf /tmp/dashboard-deploy-$RELEASE_SHA.tar.gz -C /tmp/dashboard-deploy-$RELEASE_SHA && \
             RELEASE_ROOT='$RELEASE_ROOT' SHARED_CONFIG_DIR='$SHARED_CONFIG_DIR' \
             PUBLIC_HEALTH_URL='$PUBLIC_HEALTH_URL' CREATE_DB_BACKUP=true \
             bash /tmp/dashboard-deploy-$RELEASE_SHA/ops/deploy-release.sh production '$RELEASE_SHA' \
             /tmp/dashboard-$RELEASE_SHA.tar.gz"
      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Production deployment"
            echo "- SHA: \`$RELEASE_SHA\`"
            echo "- Health: $PUBLIC_HEALTH_URL/api/health"
            echo "- Backup: created and validated by the release job before activation"
            echo "- Result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
