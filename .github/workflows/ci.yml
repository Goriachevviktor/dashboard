name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Unit tests
        run: find src -name '*.test.js' -print0 | xargs -0 node --test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Lint changed frontend files
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=$(git rev-list --max-parents=0 "$HEAD_SHA")
          fi
          bash ops/lint-changed-frontend.sh "$BASE_SHA" "$HEAD_SHA"

  backend:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-password
      DASHBOARD_DATABASE_URL: postgresql://dashboard:ci-password@dashboard-db:5432/dashboard
      DASHBOARD_API_TOKEN: ci-token
      DASHBOARD_JWT_SECRET: ci-jwt-secret
      DASHBOARD_ADMIN_EMAIL: admin@example.test
      DASHBOARD_ADMIN_PASSWORD: ci-admin-password
      DASHBOARD_ADMIN_NAME: CI Admin
      DASHBOARD_VAPID_PUBLIC_KEY: ci-public-key
      DASHBOARD_VAPID_CLAIMS_SUB: mailto:ci@example.test
    steps:
      - uses: actions/checkout@v4
      - name: Start PostgreSQL
        run: docker compose up -d --wait dashboard-db
        working-directory: server
      - name: Run API tests
        run: |
          docker compose run --rm \
            -v "$PWD/api:/workspace" -w /workspace -e PYTHONPATH=/workspace \
            dashboard-api sh -lc 'pip install -q -r requirements-dev.txt && pytest -q'
        working-directory: server

  caddy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test tests/caddy_contract.test.js
        working-directory: server

  release-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ops/tests/release_helpers_test.sh
      - run: bash ops/tests/deploy_release_contract_test.sh
      - run: python3 ops/tests/workflow_contract_test.py

  compose-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-password
      DASHBOARD_DATABASE_URL: postgresql://dashboard:ci-password@dashboard-db:5432/dashboard
      DASHBOARD_API_TOKEN: ci-token
      DASHBOARD_JWT_SECRET: ci-jwt-secret
      DASHBOARD_ADMIN_EMAIL: admin@example.test
      DASHBOARD_ADMIN_PASSWORD: ci-admin-password
      DASHBOARD_ADMIN_NAME: CI Admin
      DASHBOARD_VAPID_PUBLIC_KEY: ci-public-key
      DASHBOARD_VAPID_CLAIMS_SUB: mailto:ci@example.test
    steps:
      - uses: actions/checkout@v4
      - run: touch vapid_private.pem
        working-directory: server
      - run: docker compose build
        working-directory: server
